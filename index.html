*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f0f7f2;color:#1a2e22;min-height:100vh}
:root{
  --bg:#f0f7f2;--surf:#ffffff;--surf2:#e8f5ec;--surf3:#d4edda;
  --border:#b8dfc4;--accent:#2d9e5f;--green:#22c55e;--red:#e53e3e;
  --amber:#d97706;--text:#1a2e22;--text2:#4a7a5a;--text3:#7faa8a;
  --radius:14px;--radius-sm:8px;

.app{display:flex;flex-direction:column;min-height:100vh;max-width:800px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#2d9e5f,#1a7a42);border-bottom:1px solid var(--border);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:#ffffff}
.hdr-logo span{color:#a8f0c6}
.hdr-date{font-size:12px;color:rgba(255,255,255,.7);font-family:'DM Mono',monospace}
.tabs{display:flex;background:#ffffff;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:99px;z-index:40}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:70px;padding:12px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;
  border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;margin-left:3px;vertical-align:middle}
.page{padding:14px;padding-bottom:20px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
input[type=text],input[type=date],input[type=number],select{
  background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;
  border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;
  transition:all .15s;font-family:'DM Sans',sans-serif;letter-spacing:-.2px}
.btn-primary{background:#2d9e5f;color:#fff}.btn-primary:hover{background:#246e49}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent)}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}
.lodge-search{margin-bottom:10px}
.lodge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:7px}
.lodge-chip{background:var(--surf2);border:2px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 6px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);
  cursor:pointer;transition:all .15s;user-select:none}
.lodge-chip:hover{border-color:var(--accent);color:var(--text)}
.lodge-chip.sel{background:#2d9e5f;border-color:#2d9e5f;color:#fff}
.lodge-chip.ok{border-color:var(--green);color:var(--green)}
.lodge-chip.short{border-color:var(--red);color:var(--red)}
.lodge-chip.over{border-color:var(--amber);color:var(--amber)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--surf2);padding:9px 8px;text-align:left;font-size:10px;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.tbl td{padding:8px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl .center{text-align:center}
.item-name{font-weight:600;color:var(--text)}
.exp-val{color:var(--text2);font-family:'DM Mono',monospace;font-size:13px}
.stepper{display:flex;align-items:center;gap:5px;justify-content:center}
.step-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--surf3);

.step-btn:active{background:#2d9e5f;color:#fff}
.step-inp{width:44px;text-align:center;padding:5px 3px;font-size:15px;font-weight:700;font-family:'DM Mono',monospace}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;min-width:54px;justify-content:center}
.chip-ok{background:rgba(34,197,94,.15);color:var(--green)}
.chip-short{background:rgba(244,63,94,.15);color:var(--red)}
.chip-over{background:rgba(245,158,11,.15);color:var(--amber)}

.alert-box{background:rgba(229,62,62,.08);border:1px solid rgba(229,62,62,.25);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.alert-box h3{color:var(--red);font-size:14px;margin-bottom:8px}
.alert-row{font-size:13px;color:var(--text2);padding:4px 0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.alert-row strong{color:var(--text)}
.alert-missing{color:var(--red);font-weight:700;font-family:'DM Mono',monospace}
.stock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stock-item{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.stock-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stock-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.stock-val.low{color:var(--red)}.stock-val.ok{color:var(--green)}.stock-val.warn{color:var(--amber)}

.fc-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fc-day-name{font-size:15px;font-weight:700}
.fc-day-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}

.fc-item-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.fc-item-row:last-child{border-bottom:none}
.fc-item-name{color:var(--text2)}
.fc-item-need{font-weight:700;font-family:'DM Mono',monospace}
.hist-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.hist-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hist-lodge{font-size:16px;font-weight:700}
.hist-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.hist-items{font-size:12px;color:var(--text2);line-height:2}
.edit-link{font-size:12px;color:#2d9e5f;cursor:pointer;padding:4px 8px;border-radius:4px;

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--surf);border-top:1px solid var(--border);border-radius:20px 20px 0 0;

.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.season-row{display:flex;gap:8px;margin-bottom:12px}
.season-btn{flex:1;padding:9px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;

.section-hdr{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 10px}
.field-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.mono{font-family:'DM Mono',monospace}
.c-red{color:var(--red)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-muted{color:var(--text3)}.c-blue{color:var(--accent)}
.watch-box{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.menu-switcher{display:flex;background:var(--surf2);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:41}
.menu-btn{flex:1;padding:8px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;

.menu-btn.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surf)}
.lodge-status-chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.ls-full{background:rgba(34,197,94,.15);color:var(--green)}
.ls-short{background:rgba(229,62,62,.15);color:var(--red)}
.ls-own{background:rgba(112,48,160,.15);color:#7030a0}
.ls-unknown{background:var(--surf2);color:var(--text3)}
.pending-box{background:rgba(79,124,255,.08);border:1px solid rgba(79,124,255,.2);border-radius:var(--radius-sm);padding:10px 12px;margin-top:8px;font-size:12px;color:#4a7a5a}
@media(min-width:600px){.stock-grid{grid-template-columns:repeat(4,1fr)}}
</style>

  try {

    if (!resp.ok) return null;
    const rows = await resp.json();
    return rows.length > 0 ? rows[0].value : null;
  } catch(e) { return null; }
};

    if (!resp.ok) return null;
    const rows = await resp.json();
    const data = {};
    rows.forEach(r => { data[r.key] = r.value; });
    return {
      shelf:          data.shelf          || {},
      counts:         data.counts         || [],
      glFlow:         data.glflow         || [],
      watchList:      data.watchlist      || [],
      lodges:         data.lodges && Object.keys(data.lodges).length > 0 ? data.lodges : null,
      season:         data.season         || 'high',
      lodgeStatus:    data.lodgestatus    || {},
      pendingReturns: data.pendingreturns || [],
      _updated:       data.updated_at     || null
    };
  } catch(e) { console.error('fetchAllData failed:', e); return null; }
};

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('count');
  const [lodges, setLodges] = useState(DEFAULT_LODGES);
  const [counts, setCounts] = useState([]);
  const [shelf, setShelf] = useState({});
  const [glFlow, setGlFlow] = useState([]);
  const [watchList, setWatchList] = useState([]);
  const [season, setSeason] = useState('high');
  const [lodgeStatus, setLodgeStatus] = useState({});   // per-lodge stock status
  const [pendingReturns, setPendingReturns] = useState([]); // items noted but not yet counted in
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [menu, setMenu] = useState('ops'); // ops | stock

  // Load data — localStorage first for speed, then sync from shared storage
  useEffect(() => {
    const init = async () => {
      setLoading(true);

      // Step 1 — load from localStorage immediately (fast, works offline)
      const cached = localLoad('gl:cache', null);
      if (cached) {
        if (cached.lodges) setLodges(cached.lodges);
        setCounts(pruneOld(cached.counts || []));
        setShelf(cached.shelf || {});
        setWatchList(cached.watchList || []);
        setSeason(cached.season || 'high');
      }
      setLoading(false);

      // Step 2 — always sync from Supabase (shared across devices)
      const data = await fetchAllData();
      if (data) {
        if (data.lodges) setLodges(data.lodges);
        setCounts(pruneOld(data.counts || []));
        setShelf(data.shelf || {});
        setGlFlow(data.glFlow || []);
        setWatchList(data.watchList || []);
        setSeason(data.season || 'high');
        setLodgeStatus(data.lodgeStatus || {});
        setPendingReturns(data.pendingReturns || []);
        localSave('gl:cache', data);
        setLastSync(new Date().toLocaleTimeString('en-GB'));
      }
    };
    init();
  }, []);

  // Save locally and post to Apps Script for server-side Google Sheet write
  const syncKey = async (key, value) => {
    setSyncing(true);
    await supaSet(key, value);
    setLastSync(new Date().toLocaleTimeString('en-GB'));
    setSyncing(false);
  };

  const updateCache = (overrides) => {
    const updated = { lodges, counts, shelf, glFlow, watchList, season,
      _updated: new Date().toISOString(), ...overrides };
    localSave('gl:cache', updated);
    return updated;
  };

  const saveLodges        = v => { setLodges(v); updateCache({lodges:v}); syncKey('lodges', v); };
  const saveCounts        = v => { const p=pruneOld(v); setCounts(p); updateCache({counts:p}); syncKey('counts', p); };
  const saveShelf         = v => { setShelf(v); updateCache({shelf:v}); syncKey('shelf', v); };
  const saveGlFlow        = v => { setGlFlow(v); updateCache({glFlow:v}); syncKey('glflow', v); };
  const saveWatch         = v => { setWatchList(v); updateCache({watchList:v}); syncKey('watchlist', v); };
  const saveSeason        = v => { setSeason(v); updateCache({season:v}); syncKey('season', v); };
  const saveLodgeStatus   = v => { setLodgeStatus(v); updateCache({lodgeStatus:v}); syncKey('lodgestatus', v); };
  const savePendingReturns= v => { setPendingReturns(v); updateCache({pendingReturns:v}); syncKey('pendingreturns', v); };

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
      background:'#f0f7f2',color:'#4a7a5a',flexDirection:'column',gap:12}}>
      <div style={{fontSize:40}}>🧺</div>
      <div style={{fontSize:16,fontWeight:600}}>GL Linen</div>
      <div style={{fontSize:13,color:'#7faa8a'}}>Loading shared data...</div>
    </div>
  );

  const shortAlerts = counts.filter(c => c.hasShort && c.date === todayStr());
  const opsTabs   = [['count','Count'],['alerts','Alerts'],['glflow','GL Flow'],['forecast','Forecast']];
  const stockTabs = [['warehouse','Warehouse'],['lodgestock','Lodges'],['glsummary','GL Summary'],['history','History'],['settings','+ Lodge']];
  const activeTabs = menu==='ops' ? opsTabs : stockTabs;

  return (
    <div className="app">
      <div className="hdr">
        <div>
          <div className="hdr-logo">GL <span>Linen</span></div>
          <div className="hdr-date">{fmtDateLong(todayStr())}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
          <div style={{fontSize:24}}>🧺</div>
          {syncing && <div style={{fontSize:10,color:'rgba(255,255,255,.7)'}}>⟳ Syncing...</div>}
          {lastSync && !syncing && <div style={{fontSize:10,color:'rgba(255,255,255,.5)'}}>✓ {lastSync}</div>}
        </div>
      </div>
      <div className="menu-switcher">
        <div className={`menu-btn${menu==='ops'?' on':''}`} onClick={()=>{setMenu('ops');setTab('count');}}>📋 Daily Operations</div>
        <div className={`menu-btn${menu==='stock'?' on':''}`} onClick={()=>{setMenu('stock');setTab('warehouse');}}>📦 Stock Management</div>
      </div>
      <div className="tabs">
        {activeTabs.map(([id,label]) => (
          <div key={id} className={`tab${tab===id?' on':''}`} onClick={() => setTab(id)}>
            {label}
            {id==='alerts' && shortAlerts.length > 0 && <span className="badge">{shortAlerts.length}</span>}
          </div>
        ))}
      </div>
      <div className="page">
        {tab==='count'      && <CountTab lodges={lodges} counts={counts} saveCounts={saveCounts} shelf={shelf} saveShelf={saveShelf}/>}
        {tab==='alerts'     && <AlertsTab counts={counts} saveCounts={saveCounts}/>}
        {tab==='glflow'     && <GlFlowTab glFlow={glFlow} saveGlFlow={saveGlFlow} counts={counts} watchList={watchList} saveWatch={saveWatch} shelf={shelf} saveShelf={saveShelf}/>}
        {tab==='forecast'   && <ForecastTab shelf={shelf} lodges={lodges} season={season} saveSeason={saveSeason} glFlow={glFlow}/>}
        {tab==='warehouse'  && <StockTab shelf={shelf} saveShelf={saveShelf}/>}
        {tab==='lodgestock' && <LodgeStockTab lodges={lodges} lodgeStatus={lodgeStatus} saveLodgeStatus={saveLodgeStatus} pendingReturns={pendingReturns} savePendingReturns={savePendingReturns} shelf={shelf} saveShelf={saveShelf}/>}
        {tab==='glsummary'  && <GlSummaryTab glFlow={glFlow} watchList={watchList}/>}
        {tab==='history'    && <HistoryTab counts={counts} saveCounts={saveCounts} lodges={lodges}/>}
        {tab==='settings'   && <SettingsTab lodges={lodges} saveLodges={saveLodges}/>}
      </div>
    </div>
  );
}

// ── COUNT TAB ─────────────────────────────────────────────────────────────────
function CountTab({lodges, counts, saveCounts, shelf, saveShelf}) {
  const [date, setDate] = useState(todayStr());
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [current, setCurrent] = useState({});
  const [done, setDone] = useState(false);
  const [stockOutLodge, setStockOutLodge] = useState(null);
  const [stockOutQty, setStockOutQty] = useState({});
  const [stockOutDone, setStockOutDone] = useState(false);

  const lodgeNames = Object.keys(lodges).sort();
  const filtered = lodgeNames.filter(l => l.toLowerCase().includes(search.toLowerCase()));
  const countFor = lodge => counts.find(c => c.lodge===lodge && c.date===date);

  const selectLodge = lodge => {
    const ex = countFor(lodge);
    setCurrent(ex ? {...ex.actual} : {});
    setSelected(lodge); setDone(false);
  };

  const adj = (item, d) => setCurrent(p => ({...p,[item]:Math.max(0,(p[item]??0)+d)}));
  const setV = (item, v) => { const n=parseInt(v); setCurrent(p => ({...p,[item]:isNaN(n)?0:Math.max(0,n)})); };

  const openStockOut = (lodge) => {
    const expected = lodges[lodge] || {};
    const qty = {};
    ITEMS.forEach(item => { if ((expected[item]||0) > 0) qty[item] = expected[item]; });
    setStockOutLodge(lodge);
    setStockOutQty(qty);
    setStockOutDone(false);
    setSelected(null);
  };

  const confirmStockOut = () => {
    const newShelf = {...shelf};
    ITEMS.forEach(item => {
      newShelf[item] = (newShelf[item]||0) - (stockOutQty[item]||0);
    });
    newShelf._updated = new Date().toISOString();
    saveShelf(newShelf);

    // Record stock out in history
    const entry = {
      id: Date.now(),
      lodge: stockOutLodge,
      date,
      type: 'stockout',
      expected: lodges[stockOutLodge]||{},
      actual: {...stockOutQty},
      shorts: [], overs: [],
      hasShort: false, hasOver: false,
      ts: new Date().toISOString()
    };
    saveCounts([entry, ...counts.filter(c=>!(c.lodge===stockOutLodge && c.date===date && c.type==='stockout'))]);

    setStockOutDone(true);
    setStockOutLodge(null);
    setStockOutQty({});
  };

  const submit = () => {
    if (!selected) return;
    const expected = lodges[selected]||{};
    // Treat any unsubmitted item with expected > 0 as 0 (not counted = missing)
    const actual = {};
    Object.keys(expected).forEach(item => {
      if ((expected[item]||0) > 0) {
        actual[item] = current[item] !== undefined && current[item] !== '' ? parseInt(current[item]) : 0;
      }
    });
    const shorts=[], overs=[];
    Object.keys(expected).forEach(item => {
      const exp=expected[item]||0, act=actual[item]??0;
      if (exp>0) { if(act<exp) shorts.push(item); if(act>exp) overs.push(item); }
    });
    const entry = {id:Date.now(),lodge:selected,date,expected,actual,shorts,overs,
      hasShort:shorts.length>0,hasOver:overs.length>0,ts:new Date().toISOString()};
    saveCounts([entry,...counts.filter(c=>!(c.lodge===selected&&c.date===date))]);
    setDone(true); setSelected(null); setCurrent({});
  };

  const chipCls = lodge => {
    const c = countFor(lodge);
    if (!c) return lodge===selected?'lodge-chip sel':'lodge-chip';
    return `lodge-chip ${c.hasShort?'short':c.hasOver?'over':'ok'}`;
  };

  return <>
    {done && <div className="card" style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)'}}>
      <div style={{color:'var(--green)',fontWeight:700}}>✓ Count submitted</div></div>}
    {stockOutDone && <div className="card" style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)'}}>
      <div style={{color:'var(--green)',fontWeight:700}}>✓ Stock deducted from warehouse</div></div>}

    <div className="card">
      <div className="card-title">Session Date</div>
      <input type="date" value={date} onChange={e=>{setDate(e.target.value);setSelected(null);}}/>
    </div>

    <div className="card">
      <div className="card-title">Select Lodge</div>
      <input className="lodge-search" type="text" placeholder="Search lodge..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div className="lodge-grid">
        {filtered.map(l => (
          <div key={l} style={{display:'flex',flexDirection:'column',gap:4}}>
            <div className={chipCls(l)} onClick={()=>selectLodge(l)}>{l}</div>
            <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'4px',width:'100%'}}
              onClick={()=>openStockOut(l)}>📤 Out</button>
          </div>
        ))}
      </div>
    </div>

    {stockOutLodge && (() => {
      const expected = lodges[stockOutLodge]||{};
      return <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <div style={{fontSize:20,fontWeight:700}}>{stockOutLodge} — Stock Out</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>Adjust quantities if bag is short, then confirm</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>setStockOutLodge(null)}>✕</button>
        </div>
        <table className="tbl">
          <thead><tr><th>Item</th><th className="center">Full Set</th><th className="center">Sending</th></tr></thead>
          <tbody>{ITEMS.filter(i=>(expected[i]||0)>0).map(item => (
            <tr key={item}>
              <td className="item-name">{item}</td>
              <td className="center exp-val">{expected[item]}</td>
              <td><div className="stepper">
                <button className="step-btn" onClick={()=>setStockOutQty(p=>({...p,[item]:Math.max(0,(p[item]||0)-1)}))}>−</button>
                <input className="step-inp" type="number" min="0" value={stockOutQty[item]||0}
                  onChange={e=>setStockOutQty(p=>({...p,[item]:Math.max(0,parseInt(e.target.value)||0)}))}/>
                <button className="step-btn" onClick={()=>setStockOutQty(p=>({...p,[item]:(p[item]||0)+1}))}>+</button>
              </div></td>
            </tr>
          ))}</tbody>
        </table>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={()=>setStockOutLodge(null)}>Cancel</button>
          <button className="btn btn-success" onClick={confirmStockOut}>✓ Confirm Stock Out</button>
        </div>
      </div>;
    })()}
    {selected && (() => {
      const expected = lodges[selected]||{};
      const items = ITEMS.filter(i=>(expected[i]||0)>0);
      return <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div><div style={{fontSize:20,fontWeight:700}}>{selected}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>Enter quantities from bag</div></div>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setSelected(null);setCurrent({});}}>✕</button>
        </div>
        <table className="tbl">
          <thead><tr><th>Item</th><th className="center">Expected</th><th className="center">Actual</th><th className="center">Status</th></tr></thead>
          <tbody>{items.map(item => {
            const exp=expected[item]||0, act=current[item]??'', diff=act!==''?act-exp:null;
            return <tr key={item}>
              <td className="item-name">{item}</td>
              <td className="center exp-val">{exp}</td>
              <td><div className="stepper">
                <button className="step-btn" onClick={()=>adj(item,-1)}>−</button>
                <input className="step-inp" type="number" min="0" value={act} onChange={e=>setV(item,e.target.value)}/>
                <button className="step-btn" onClick={()=>adj(item,1)}>+</button>
              </div></td>
              <td className="center">
                {diff===null?<span className="chip chip-na">—</span>
                  :diff<0?<span className="chip chip-short">▼ {Math.abs(diff)}</span>
                  :diff>0?<span className="chip chip-over">▲ {diff}</span>
                  :<span className="chip chip-ok">✓ OK</span>}
              </td>
            </tr>;
          })}</tbody>
        </table>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={()=>setCurrent({})}>Reset</button>
          <button className="btn btn-primary" onClick={submit}>✓ Submit Count</button>
        </div>
      </div>;
    })()}
  </>;
}

// ── ALERTS TAB ────────────────────────────────────────────────────────────────
function AlertsTab({counts, saveCounts}) {
  const alerts = counts.filter(c=>c.date===todayStr()&&c.hasShort);
  if (!alerts.length) return <div className="empty"><div className="empty-icon">✅</div>No discrepancies today</div>;

  const markRetrieved = (id, item) => {
    saveCounts(counts.map(c => {
      if (c.id!==id) return c;
      const actual={...c.actual,[item]:c.expected[item]};
      const shorts=c.shorts.filter(s=>s!==item);
      return {...c,actual,shorts,hasShort:shorts.length>0};
    }));
  };

  return <>
    <div style={{marginBottom:8,fontSize:13,color:'var(--text2)'}}>{alerts.length} lodge(s) with missing items today</div>
    {alerts.map(entry => <div key={entry.id} className="alert-box">
      <h3>⚠ {entry.lodge}</h3>
      {entry.shorts.map(item => {
        const missing = entry.expected[item]-entry.actual[item];
        return <div key={item} className="alert-row">
          <span><strong>{item}:</strong> expected {entry.expected[item]}, got {entry.actual[item]} — <span className="alert-missing">{missing} missing</span></span>
          <button className="btn btn-ghost btn-sm" onClick={()=>markRetrieved(entry.id,item)}>✓ Retrieved</button>
        </div>;
      })}
    </div>)}
  </>;
}

            <input className="step-inp" type="number" min="0" value={draft[item]??0} onChange={e=>setDraft(p=>({...p,[item]:Math.max(0,parseInt(e.target.value)||0)}))}/>
            <button className="step-btn" onClick={()=>setDraft(p=>({...p,[item]:(p[item]||0)+1}))}>+</button>

// ── GL FLOW TAB ───────────────────────────────────────────────────────────────
function GlFlowTab({glFlow, saveGlFlow, counts, watchList, saveWatch, shelf, saveShelf}) {
  const [view, setView] = useState('log');
  const [formDate, setFormDate] = useState(todayStr());
  const [formType, setFormType] = useState('collection');
  const [formData, setFormData] = useState({});
  const [formNotes, setFormNotes] = useState('');
  const [extras, setExtras] = useState({});

  const autoFill = () => {
    const lastCol = glFlow.find(g=>g.type==='collection');
    const cutoff = lastCol ? lastCol.date : null;
    const relevant = cutoff ? counts.filter(c=>c.date>cutoff&&c.date<=formDate) : counts.filter(c=>c.date<=formDate);
    const totals={};
    relevant.forEach(entry => ITEMS.forEach(item => {
      const v=entry.actual[item]; if(v!=null) totals[item]=(totals[item]||0)+v;
    }));
    setFormData(totals);
  };

  const saveEntry = () => {
    let missing=[];
    if (formType==='delivery') {
      const lastCol=[...glFlow].find(g=>g.type==='collection');
      if (lastCol) ITEMS.forEach(item => {
        const sent=lastCol.data[item]||0, recv=formData[item]||0;
        if (recv<sent) missing.push({item,sent,received:recv,short:sent-recv});
      });
    }
    // Merge extras into collection data
    const finalData = {...formData};
    if (formType==='collection') {
      Object.keys(extras).forEach(item => {
        if ((extras[item]||0) > 0) finalData[item] = (finalData[item]||0) + extras[item];
      });
    }
    const entry={id:Date.now(),type:formType,date:formDate,data:finalData,extras:formType==='collection'?{...extras}:{},notes:formNotes,missing,ts:new Date().toISOString()};
    saveGlFlow([entry,...glFlow]);
    if (missing.length>0) {
      const watches=missing.map(m=>({...m,fromDate:formDate,id:Date.now()+Math.random(),resolved:false}));
      saveWatch([...watchList,...watches]);
    }
    // If delivery — automatically add quantities to warehouse shelf stock
    if (formType==='delivery') {
      const newShelf = {...shelf};
      ITEMS.forEach(item => {
        if ((finalData[item]||0) > 0) {
          newShelf[item] = (newShelf[item]||0) + (finalData[item]||0);
        }
      });
      newShelf._date = formDate;
      newShelf._updated = new Date().toISOString();
      saveShelf(newShelf);
    }
    setView('log'); setFormData({}); setFormNotes(''); setExtras({});
  };

  const unresolved = watchList.filter(w=>!w.resolved);

  const adj = (item,d) => setFormData(p=>({...p,[item]:Math.max(0,(p[item]||0)+d)}));

  if (view==='form') return <>
    <div className="card">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setView('log')}>← Back</button>
        <div style={{fontSize:16,fontWeight:700}}>{formType==='collection'?'📤 GL Collection':'📥 GL Delivery'}</div>
      </div>
      <div style={{marginBottom:12}}>
        <div className="field-label" style={{marginBottom:4}}>Date</div>
        <input type="date" value={formDate} onChange={e=>setFormDate(e.target.value)}/>
      </div>
      {formType==='collection' && <button className="btn btn-ghost btn-full" style={{marginBottom:12}} onClick={autoFill}>⟳ Auto-fill from lodge counts</button>}
      <table className="tbl">
        <thead><tr><th>Item</th><th className="center">{formType==='collection'?'Sent to GL':'Received from GL'}</th></tr></thead>
        <tbody>{ITEMS.map(item => <tr key={item}>
          <td className="item-name">{item}</td>
          <td><div className="stepper">
            <button className="step-btn" onClick={()=>adj(item,-1)}>−</button>

// ── FORECAST TAB ──────────────────────────────────────────────────────────────
function ForecastTab({shelf, lodges, season, saveSeason, glFlow}) {
  const [fcData, setFcData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const GL_DAYS = {high:[1,3,5], low:[1,4]};
  const isGlDay = d => GL_DAYS[season].includes(new Date(d+'T12:00:00').getDay());

  const buildForecast = (checkouts) => {
    // Get currently with GL (last collection) as expected delivery
    const lastCollection = glFlow ? glFlow.find(g=>g.type==='collection') : null;
    const glExpected = lastCollection ? lastCollection.data : {};

    const days=[];
    let runningShelf = {...shelf};

    for (let i=0;i<7;i++) {
      const d=new Date(); d.setDate(d.getDate()+i);
      const dateStr=d.toISOString().split('T')[0];
      const lodgeList=(checkouts[dateStr]||[]).filter(l=>!EXCLUDED.has(l)&&lodges[l]);
      const totals={};
      lodgeList.forEach(l => ITEMS.forEach(item => { totals[item]=(totals[item]||0)+(lodges[l][item]||0); }));
      const glDay = isGlDay(dateStr);

      // On GL days add expected delivery to running shelf
      const shelfBefore = {...runningShelf};
      if (glDay) {
        ITEMS.forEach(item => {
          runningShelf[item] = (runningShelf[item]||0) + (glExpected[item]||0);
        });
      }

      // Deduct linen going out
      const shelfAfter = {...runningShelf};
      ITEMS.forEach(item => {
        shelfAfter[item] = (runningShelf[item]||0) - (totals[item]||0);
      });
      runningShelf = shelfAfter;

      days.push({date:dateStr, lodges:lodgeList, totals, isGl:glDay,
                 glDelivery: glDay ? glExpected : null,
                 shelfBefore, shelfAfter});
    }
    setFcData(days);
  };

  const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/CotsRet/gl-linen/main/checkouts.json';

  const fetchForecast = async () => {
    setLoading(true); setError('');
    try {
      const resp = await fetch(GITHUB_JSON_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('File not found');
      const data = await resp.json();
      const generated = data._generated ? new Date(data._generated).toLocaleString('en-GB') : 'unknown';
      console.log('checkouts.json loaded, generated:', generated);
      buildForecast(data);
    } catch(e) {
      setError('Could not load forecast data. Make sure beds24_report.py has run recently and checkouts.json is on GitHub.');
      console.error(e);
    }
    setLoading(false);
  };

  return <>
    <div className="card">
      <div className="card-title">GL Schedule</div>
      <div className="season-row">
        <div className={`season-btn${season==='high'?' on':''}`} onClick={()=>saveSeason('high')}>
          High Season<br/><span style={{fontSize:11,opacity:.7}}>Mon · Wed · Fri</span>
        </div>
        <div className={`season-btn${season==='low'?' on':''}`} onClick={()=>saveSeason('low')}>
          Low Season<br/><span style={{fontSize:11,opacity:.7}}>Mon · Thu</span>
        </div>
      </div>
      <button className="btn btn-primary btn-full" onClick={fetchForecast} disabled={loading}>
        {loading?'⟳ Loading forecast...':'⟳ Load 7-Day Forecast'}
      </button>
      {error && <div style={{color:'var(--red)',fontSize:13,marginTop:8}}>{error}</div>}
    </div>
    {!fcData && !loading && <div className="empty"><div className="empty-icon">📅</div>Press Load to fetch live checkout data</div>}
    {fcData && fcData.map(day => {
      const items=ITEMS.filter(i=>(day.totals[i]||0)>0);
      return <div key={day.date} className="fc-day" style={day.isGl?{border:'1px solid rgba(45,158,95,.4)'}:{}}>
        <div className="fc-day-header">
          <div>
            <div className="fc-day-name">{getDayName(day.date)}</div>
            <div className="fc-day-date">{fmtDate(day.date)} · {day.lodges.length} GL lodges</div>
          </div>
          {day.isGl && <div className="fc-gl-badge">GL Day</div>}
        </div>
        {day.isGl && day.glDelivery && Object.values(day.glDelivery).some(v=>v>0) && (
        <div style={{background:'rgba(45,158,95,.08)',border:'1px solid rgba(45,158,95,.2)',borderRadius:'8px',padding:'8px 10px',marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.5px'}}>Expected GL Delivery</div>
          <div style={{fontSize:12,color:'var(--text2)',display:'flex',flexWrap:'wrap',gap:'4px 16px'}}>
            {ITEMS.filter(i=>(day.glDelivery[i]||0)>0).map(i=>(
              <span key={i}>{i}: <span style={{fontWeight:700,color:'var(--accent)'}}>{day.glDelivery[i]}</span></span>
            ))}
          </div>
        </div>
      )}
      {!items.length ? <div style={{color:'var(--text3)',fontSize:13}}>No GL cleans</div>
        : items.map(item => {
          const need=day.totals[item]||0;
          const have=day.isGl?(day.shelfBefore[item]||0)+(day.glDelivery?day.glDelivery[item]||0:0):(day.shelfBefore[item]||0);
          const after=day.shelfAfter[item]||0;
          const ok=have>=need;
          return <div key={item} className="fc-item-row">
            <div className="fc-item-name">{item}</div>
            <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <div className="fc-item-shelf c-muted">available: {have}</div>
              <div className={`fc-item-need ${ok?'c-green':'c-red'}`}>need: {need}</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>after: {after}</div>
              {!ok && <span className="chip chip-short">▼{need-have}</span>}
            </div>
          </div>;
        })}
      </div>;
    })}
  </>;
}

// ── HISTORY TAB ───────────────────────────────────────────────────────────────
function HistoryTab({counts, saveCounts, lodges}) {
  const [filter, setFilter] = useState('all');
  const [editEntry, setEditEntry] = useState(null);
  const [editData, setEditData] = useState({});

  const filtered = counts.filter(c => {
    if (filter==='short') return c.hasShort;
    if (filter==='over') return c.hasOver&&!c.hasShort;
    if (filter==='ok') return !c.hasShort&&!c.hasOver;
    return true;
  });

  const saveEdit = () => {
    const expected=editEntry.expected, shorts=[], overs=[];
    ITEMS.forEach(item => {
      const exp=expected[item]||0, act=editData[item];
      if (act!=null&&exp>0) { if(act<exp) shorts.push(item); if(act>exp) overs.push(item); }
    });
    saveCounts(counts.map(c=>c.id===editEntry.id?{...c,actual:{...editData},shorts,overs,hasShort:shorts.length>0,hasOver:overs.length>0}:c));
    setEditEntry(null);
  };

  return <>
    {editEntry && <div className="modal-bg" onClick={()=>setEditEntry(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Edit: {editEntry.lodge} — {fmtDate(editEntry.date)}</div>
        <table className="tbl">
          <thead><tr><th>Item</th><th className="center">Expected</th><th className="center">Actual</th></tr></thead>
          <tbody>{ITEMS.filter(i=>(editEntry.expected[i]||0)>0).map(item => <tr key={item}>
            <td className="item-name">{item}</td>
            <td className="center exp-val">{editEntry.expected[item]}</td>
            <td><div className="stepper">
              <button className="step-btn" onClick={()=>setEditData(p=>({...p,[item]:Math.max(0,(p[item]||0)-1)}))}>−</button>
              <input className="step-inp" type="number" min="0" value={editData[item]??0} onChange={e=>setEditData(p=>({...p,[item]:Math.max(0,parseInt(e.target.value)||0)}))}/>
              <button className="step-btn" onClick={()=>setEditData(p=>({...p,[item]:(p[item]||0)+1}))}>+</button>
            </div></td>
          </tr>)}</tbody>
        </table>
        <div className="btn-row" style={{marginTop:16}}>
          <button className="btn btn-ghost" onClick={()=>setEditEntry(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveEdit}>Save Changes</button>
        </div>
      </div>
    </div>}
    <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[['all','All'],['short','⚠ Short'],['over','↑ Over'],['ok','✓ OK']].map(([v,l]) =>
          <button key={v} className={`btn btn-sm ${filter===v?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(v)}>{l}</button>
        )}
      </div>
      <button className="btn btn-sm" style={{background:'rgba(229,62,62,.1)',color:'var(--red)',border:'1px solid rgba(229,62,62,.3)'}}
        onClick={()=>{ if(window.confirm('Clear all count history? This cannot be undone.')) saveCounts([]); }}>🗑 Clear All</button>
    </div>
    {!filtered.length ? <div className="empty"><div className="empty-icon">📋</div>No counts recorded yet</div>
    : filtered.map(entry => {
      const isStockOut = entry.type === 'stockout';
      const color = isStockOut ? 'var(--accent)' : entry.hasShort?'var(--red)':entry.hasOver?'var(--amber)':'var(--green)';
      const icon  = isStockOut ? '📤' : entry.hasShort?'⚠':entry.hasOver?'↑':'✓';
      return <div key={entry.id} className="hist-item">
        <div className="hist-header">
          <div>
            <div className="hist-lodge" style={{color}}>{icon} {entry.lodge}</div>
            <div className="hist-date">{fmtDate(entry.date)}</div>
          </div>
          <span className="edit-link" onClick={()=>{setEditEntry(entry);setEditData({...entry.actual});}}>Edit</span>
        </div>
        <div className="hist-items">
          {entry.type==='stockout'
            ? ITEMS.filter(i=>(entry.actual[i]||0)>0).map(item => (
                <span key={item} style={{marginRight:12}}>
                  {item}: <span className="mono c-blue">{entry.actual[item]}</span>
                </span>
              ))
            : ITEMS.filter(i=>(entry.expected[i]||0)>0).map(item => {
                const exp=entry.expected[item],act=entry.actual[item],diff=act!=null?act-exp:null;
                return <span key={item} style={{marginRight:12}}>
                  {item}: <span className="mono">{act??'?'}/{exp}</span>
                  {diff!==null&&diff<0&&<span className="c-red mono"> ▼{Math.abs(diff)}</span>}
                  {diff!==null&&diff>0&&<span className="c-amber mono"> ▲{diff}</span>}
                </span>;
              })
          }
        </div>
      </div>;
    })}
  </>;
}

                  <button className="step-btn" onClick={()=>setPendingForm(p=>({...p,items:{...p.items,[item]:Math.max(0,(p.items[item]||0)-1)}}))}>−</button>
                  <input className="step-inp" type="number" min="0" value={pendingForm.items[item]||0}
                    onChange={e=>setPendingForm(p=>({...p,items:{...p.items,[item]:Math.max(0,parseInt(e.target.value)||0)}}))}/>
                  <button className="step-btn" onClick={()=>setPendingForm(p=>({...p,items:{...p.items,[item]:(p.items[item]||0)+1}}))}>+</button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </>}
      <div style={{marginTop:12}}>
        <div className="card-title">Comment</div>
        <input type="text" placeholder="e.g. found after clean, bed not used..."
          value={pendingForm.comment} onChange={e=>setPendingForm(p=>({...p,comment:e.target.value}))}/>
      </div>
      <div className="btn-row">
        <button className="btn btn-ghost" onClick={()=>setView('list')}>Cancel</button>
        <button className="btn btn-primary" onClick={addPending}>✓ Log Pending Return</button>
      </div>
    </div>
  );

  return <>
    {shortLodges.length > 0 && <div className="card" style={{background:'rgba(229,62,62,.05)',border:'1px solid rgba(229,62,62,.2)'}}>
      <div className="card-title" style={{color:'var(--red)'}}>⚠ Lodges with Stock Issues ({shortLodges.length})</div>
      {shortLodges.map(lodge => {
        const s = getStatus(lodge);
        const missingItems = Object.keys(s.items||{}).filter(i=>(s.items[i]||0)>0);
        return <div key={lodge} style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{lodge} {statusChip(s.status)}</div>
              {missingItems.length>0 && <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>
                Missing: {missingItems.map(i=>`${s.items[i]} ${i}`).join(', ')}
              </div>}
              {s.comment && <div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic',marginTop:2}}>{s.comment}</div>}
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(lodge)}>Edit</button>
              <button className="btn btn-success btn-sm" onClick={()=>clearStatus(lodge)}>✓ Clear</button>
            </div>
          </div>
        </div>;
      })}
    </div>}

    {pendingReturns.length > 0 && <div className="card" style={{background:'rgba(79,124,255,.05)',border:'1px solid rgba(79,124,255,.2)'}}>
      <div className="card-title" style={{color:'var(--accent)'}}>📦 Pending Returns ({pendingReturns.length})</div>
      {pendingReturns.map(entry => {
        const items = Object.keys(entry.items).filter(i=>(entry.items[i]||0)>0);
        return <div key={entry.id} style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{entry.lodge} <span style={{fontSize:11,color:'var(--text3)',fontFamily:'DM Mono,monospace'}}>{fmtDate(entry.date)}</span></div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{items.map(i=>`${entry.items[i]} ${i}`).join(', ')}</div>
              {entry.comment && <div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic',marginTop:2}}>{entry.comment}</div>}
            </div>
            <button className="btn btn-success btn-sm" onClick={()=>receivePending(entry.id)}>✓ Received</button>
          </div>
        </div>;
      })}
    </div>}

    <div className="btn-row" style={{marginBottom:12}}>
      <button className="btn btn-ghost" onClick={()=>setView('pending')}>📦 Log Pending Return</button>
    </div>

    <div className="card">
      <div className="card-title">All Lodges</div>
      <input className="lodge-search" type="text" placeholder="Search lodge..." value={search}
        onChange={e=>setSearch(e.target.value)}/>
      {filtered.map(lodge => {
        const s = getStatus(lodge);
        const missingItems = Object.keys(s.items||{}).filter(i=>(s.items[i]||0)>0);
        return <div key={lodge} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{lodge} {statusChip(s.status)}</div>
            {missingItems.length>0 && <div style={{fontSize:11,color:'var(--red)',marginTop:2}}>
              {missingItems.map(i=>`${s.items[i]} ${i}`).join(', ')} missing
            </div>}
            {s.comment && <div style={{fontSize:11,color:'var(--text3)',fontStyle:'italic',marginTop:2}}>{s.comment}</div>}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(lodge)}>Edit</button>
        </div>;
      })}
    </div>
  </>;
}


// ── GL SUMMARY TAB ────────────────────────────────────────────────────────────
function GlSummaryTab({glFlow, watchList}) {
  const ITEMS = ['Bath Sheet','Bath Mat','Hand Towel','S King D','S King S',
                 'King D','King S','Single D','Single S','Pillow C','Oxford','Tea Towel'];

  // Find last collection and last delivery
  const lastCollection = glFlow.find(g => g.type === 'collection');
  const lastDelivery   = glFlow.find(g => g.type === 'delivery');

  // Calculate totals
  const totalCollected = {}, totalDelivered = {};
  glFlow.forEach(entry => {
    ITEMS.forEach(item => {
      if (entry.type==='collection') totalCollected[item]=(totalCollected[item]||0)+(entry.data[item]||0);
      else if (entry.type==='delivery') totalDelivered[item]=(totalDelivered[item]||0)+(entry.data[item]||0);
    });
  });

  // Currently with GL = the most recent collection only
  // GL always returns linen from a PREVIOUS cycle, not the current one
  // So we show the last collection in full as "pending return"
  const withGL = {};
  if (lastCollection) {
    ITEMS.forEach(item => {
      withGL[item] = lastCollection.data[item] || 0;
    });
  }

  const hasWithGL   = Object.values(withGL).some(v => v > 0) || Object.keys(totalCollected).length > 0;
  const unresolvedWatch = watchList.filter(w => !w.resolved);

  return <>
    {/* Currently with GL */}
    <div className="card">
      <div className="card-title">Currently with GL</div>
      {lastCollection
        ? <div style={{fontSize:12,color:'var(--text3)',marginBottom:12,fontFamily:'DM Mono,monospace'}}>
            Last collection: {fmtDate(lastCollection.date)}
            {lastDelivery && lastDelivery.date > lastCollection.date
              ? ' — delivery received ' + fmtDate(lastDelivery.date)
              : ' — awaiting delivery'}
          </div>
        : null}
      {!lastCollection
        ? <div className="empty" style={{padding:'20px 0'}}><div className="empty-icon">🔄</div>No GL collections recorded yet</div>
        : !hasWithGL
        ? <div style={{color:'var(--green)',fontWeight:600,fontSize:14}}>✓ All linen has been returned by GL</div>
        : <table className="tbl">
            <thead><tr>
              <th>Item</th>
              <th className="center">With GL</th>
            </tr></thead>
            <tbody>{ITEMS.filter(i => (withGL[i]||0) > 0).map(item => (
              <tr key={item}>
                <td className="item-name">{item}</td>
                <td className="center mono" style={{fontWeight:700,color:'var(--accent)'}}>{withGL[item]}</td>
              </tr>
            ))}</tbody>
          </table>}
    </div>

    {/* Last Collection */}
    {lastCollection && <div className="card">
      <div className="card-title">Last Collection — {fmtDate(lastCollection.date)}</div>
      <table className="tbl">
        <thead><tr><th>Item</th><th className="center">Qty</th></tr></thead>
        <tbody>{ITEMS.filter(i=>(lastCollection.data[i]||0)>0).map(item => (
          <tr key={item}>
            <td className="item-name">{item}</td>
            <td className="center mono">{lastCollection.data[item]}</td>
          </tr>
        ))}</tbody>
      </table>
      {lastCollection.notes && <div style={{marginTop:8,fontSize:12,color:'var(--text2)',fontStyle:'italic'}}>Note: {lastCollection.notes}</div>}
      {lastCollection.extras && Object.values(lastCollection.extras).some(v=>v>0) && <>
        <div style={{marginTop:12,fontWeight:600,fontSize:13,color:'var(--text2)'}}>Extras included:</div>
        {ITEMS.filter(i=>(lastCollection.extras[i]||0)>0).map(item => (
          <div key={item} style={{fontSize:12,color:'var(--text2)',padding:'2px 0'}}>
            {item}: <span style={{fontWeight:700}}>{lastCollection.extras[item]}</span>
          </div>
        ))}
      </>}
    </div>}

    {/* Last Delivery */}
    {lastDelivery && <div className="card">
      <div className="card-title">Last Delivery — {fmtDate(lastDelivery.date)}</div>
      <table className="tbl">
        <thead><tr><th>Item</th><th className="center">Received</th></tr></thead>
        <tbody>{ITEMS.filter(i=>(lastDelivery.data[i]||0)>0).map(item => (
          <tr key={item}>
            <td className="item-name">{item}</td>
            <td className="center mono">{lastDelivery.data[item]}</td>
          </tr>
        ))}</tbody>
      </table>
      {lastDelivery.missing?.length > 0 && <div style={{marginTop:8,background:'rgba(229,62,62,.08)',border:'1px solid rgba(229,62,62,.2)',borderRadius:'8px',padding:'10px 12px'}}>
        <div style={{fontWeight:700,color:'var(--red)',fontSize:13,marginBottom:6}}>⚠ Short on delivery:</div>
        {lastDelivery.missing.map(m => (
          <div key={m.item} style={{fontSize:12,color:'var(--text2)',padding:'2px 0'}}>
            {m.item}: sent {m.sent}, received {m.received} — <span style={{color:'var(--red)',fontWeight:700}}>{m.short} missing</span>
          </div>
        ))}
      </div>}
    </div>}

    {/* Watch List */}
    {unresolvedWatch.length > 0 && <div className="card" style={{background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.2)'}}>
      <div className="card-title" style={{color:'var(--amber)'}}>⚠ Outstanding — Items Still Owed by GL ({unresolvedWatch.length})</div>
      {unresolvedWatch.map(w => (
        <div key={w.id} style={{padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
          <span style={{fontWeight:600}}>{w.item}</span> — 
          <span className="c-red mono"> {w.short} missing</span>
          <span style={{fontSize:11,color:'var(--text3)',marginLeft:8}}>from {fmtDate(w.fromDate)} · sent {w.sent}, received {w.received}</span>
        </div>
      ))}
    </div>}
  </>;
}

// ── SETTINGS TAB ──────────────────────────────────────────────────────────────
function SettingsTab({lodges, saveLodges}) {
  const [name, setName] = useState('');
  const [quantities, setQuantities] = useState({});
  const [saved, setSaved] = useState(false);
  const [deleting, setDeleting] = useState(null);

  const addLodge = () => {
    if (!name.trim()) return;
    saveLodges({...lodges,[name.trim().toUpperCase()]:{...quantities}});
    setName(''); setQuantities({}); setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };
  const deleteLodge = lodge => { const n={...lodges}; delete n[lodge]; saveLodges(n); setDeleting(null); };

  return <>
    {saved && <div className="card" style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',marginBottom:12}}>
      <div style={{color:'var(--green)',fontWeight:700}}>✓ Lodge added successfully</div>
    </div>}
    <div className="card">
      <div className="card-title">Add New Lodge</div>
      <div style={{marginBottom:12}}>
        <div className="field-label" style={{marginBottom:4}}>Lodge Code</div>
        <input type="text" placeholder="e.g. ML29" value={name} onChange={e=>setName(e.target.value.toUpperCase())}/>
      </div>
      <div className="section-hdr">Linen Quantities</div>
      <table className="tbl">
        <thead><tr><th>Item</th><th className="center">Qty</th></tr></thead>
        <tbody>{ITEMS.map(item => <tr key={item}>
          <td className="item-name">{item}</td>
          <td><div className="stepper">
            <button className="step-btn" onClick={()=>setQuantities(p=>({...p,[item]:Math.max(0,(p[item]||0)-1)}))}>−</button>
            <input className="step-inp" type="number" min="0" value={quantities[item]??0} onChange={e=>setQuantities(p=>({...p,[item]:Math.max(0,parseInt(e.target.value)||0)}))}/>
            <button className="step-btn" onClick={()=>setQuantities(p=>({...p,[item]:(p[item]||0)+1}))}>+</button>
          </div></td>
        </tr>)}</tbody>
      </table>
      <button className="btn btn-primary btn-full" style={{marginTop:12}} onClick={addLodge}>+ Add Lodge</button>
    </div>
    <div className="card">
      <div className="card-title">Manage Lodges ({Object.keys(lodges).length})</div>
      {Object.keys(lodges).sort().map(lodge => <div key={lodge} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontWeight:600}}>{lodge}</div>
        {deleting===lodge ? <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setDeleting(null)}>Cancel</button>
          <button className="btn btn-danger btn-sm" onClick={()=>deleteLodge(lodge)}>Delete</button>
        </div> : <button className="btn btn-ghost btn-sm" onClick={()=>setDeleting(lodge)}>Remove</button>}
      </div>)}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
