// ── GIST SYNC ─────────────────────────────────────────────────────────────────
// Reads from public Gist URL, writes via API using token
// GIST_ID and GIST_TOKEN are defined at the top of the script

const GIST_API = `https://api.github.com/gists/${GIST_ID}`;
const GIST_RAW = `https://gist.githubusercontent.com/CotsRet/${GIST_ID}/raw/data.json`;

// Local cache fallback
const localLoad = (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } };
const localSave = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} };

const fetchGist = async () => {
  try {
    const resp = await fetch(GIST_RAW + '?t=' + Date.now());
    if (!resp.ok) return null;
    return await resp.json();
  } catch(e) { return null; }
};

const pushGist = async (data) => {
  try {
    await fetch(GIST_API, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${GIST_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: { 'data.json': { content: JSON.stringify(data, null, 2) } }
      })
    });
  } catch(e) { console.error('Gist push failed:', e); }
};

      setLoading(true);
      const gistData = await fetchGist();

        localSave('gl:gist_cache', gistData);

        const cache = localLoad('gl:gist_cache', null);

          setGlFlow(cache.glFlow || []);

  const buildState = (overrides = {}) => {
    const state = {
      lodges, counts, shelf, glFlow, watchList, season,
      _updated: new Date().toISOString(),
      ...overrides
    };
    localSave('gl:gist_cache', state);
    return state;
  };

  const syncToGist = async (overrides = {}) => {
    setSyncing(true);
    await pushGist(buildState(overrides));
    setLastSync(new Date().toLocaleTimeString('en-GB'));
    setSyncing(false);
  };

  const saveLodges = v => { setLodges(v); syncToGist({lodges: v}); };
  const saveCounts = v => { const p = pruneOld(v); setCounts(p); syncToGist({counts: p}); };
  const saveShelf  = v => { setShelf(v); syncToGist({shelf: v}); };
  const saveGlFlow = v => { setGlFlow(v); syncToGist({glFlow: v}); };
  const saveWatch  = v => { setWatchList(v); syncToGist({watchList: v}); };
  const saveSeason = v => { setSeason(v); syncToGist({season: v}); };

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
      background:'#f0f7f2',color:'#4a7a5a',flexDirection:'column',gap:12}}>
      <div style={{fontSize:40}}>🧺</div>
      <div style={{fontSize:16,fontWeight:600}}>GL Linen</div>
      <div style={{fontSize:13,color:'#7faa8a'}}>Loading shared data...</div>
    </div>
  );

  const shortAlerts = counts.filter(c => c.hasShort && c.date === todayStr());
  const tabs = [['count','Count'],['alerts','Alerts'],['stock','Stock'],
                ['glflow','GL Flow'],['forecast','Forecast'],['history','History'],['settings','+ Lodge']];

  return (
    <div className="app">
      <div className="hdr">
        <div>
          <div className="hdr-logo">GL <span>Linen</span></div>
          <div className="hdr-date">{fmtDateLong(todayStr())}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
          <div style={{fontSize:24}}>🧺</div>
          {syncing && <div style={{fontSize:10,color:'rgba(255,255,255,.7)'}}>⟳ Syncing...</div>}
          {lastSync && !syncing && <div style={{fontSize:10,color:'rgba(255,255,255,.5)'}}>✓ {lastSync}</div>}
        </div>
      </div>
      <div className="tabs">
        {tabs.map(([id,label]) => (
          <div key={id} className={`tab${tab===id?' on':''}`} onClick={() => setTab(id)}>
            {label}
            {id==='alerts' && shortAlerts.length > 0 && <span className="badge">{shortAlerts.length}</span>}
          </div>
        ))}
      </div>
      <div className="page">
        {tab==='count'    && <CountTab lodges={lodges} counts={counts} saveCounts={saveCounts}/>}
        {tab==='alerts'   && <AlertsTab counts={counts} saveCounts={saveCounts}/>}
        {tab==='stock'    && <StockTab shelf={shelf} saveShelf={saveShelf}/>}
        {tab==='glflow'   && <GlFlowTab glFlow={glFlow} saveGlFlow={saveGlFlow} counts={counts} watchList={watchList} saveWatch={saveWatch}/>}
        {tab==='forecast' && <ForecastTab shelf={shelf} lodges={lodges} season={season} saveSeason={saveSeason}/>}
        {tab==='history'  && <HistoryTab counts={counts} saveCounts={saveCounts} lodges={lodges}/>}
        {tab==='settings' && <SettingsTab lodges={lodges} saveLodges={saveLodges}/>}
      </div>
    </div>
  );
}

// ── COUNT TAB ─────────────────────────────────────────────────────────────────
function CountTab({lodges, counts, saveCounts}) {
  const [date, setDate] = useState(todayStr());
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [current, setCurrent] = useState({});
  const [done, setDone] = useState(false);

  const lodgeNames = Object.keys(lodges).sort();
  const filtered = lodgeNames.filter(l => l.toLowerCase().includes(search.toLowerCase()));
  const countFor = lodge => counts.find(c => c.lodge===lodge && c.date===date);

  const selectLodge = lodge => {
    const ex = countFor(lodge);
    setCurrent(ex ? {...ex.actual} : {});
    setSelected(lodge); setDone(false);
  };

  const adj = (item, d) => setCurrent(p => ({...p,[item]:Math.max(0,(p[item]??0)+d)}));
  const setV = (item, v) => { const n=parseInt(v); setCurrent(p => ({...p,[item]:isNaN(n)?0:Math.max(0,n)})); };

  const submit = () => {
    if (!selected) return;
    const expected = lodges[selected]||{};
    const actual = {...current};
    const shorts=[], overs=[];
    Object.keys(expected).forEach(item => {
      const exp=expected[item]||0, act=actual[item]??null;
      if (act!==null && exp>0) { if(act<exp) shorts.push(item); if(act>exp) overs.push(item); }
    });
    const entry = {id:Date.now(),lodge:selected,date,expected,actual,shorts,overs,
      hasShort:shorts.length>0,hasOver:overs.length>0,ts:new Date().toISOString()};
    saveCounts([entry,...counts.filter(c=>!(c.lodge===selected&&c.date===date))]);
    setDone(true); setSelected(null); setCurrent({});
  };

  const chipCls = lodge => {
    const c = countFor(lodge);
    if (!c) return lodge===selected?'lodge-chip sel':'lodge-chip';
    return `lodge-chip ${c.hasShort?'short':c.hasOver?'over':'ok'}`;
  };

  return <>
    {done && <div className="card" style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)'}}>
      <div style={{color:'var(--green)',fontWeight:700}}>✓ Count submitted</div></div>}
    <div className="card">
      <div className="card-title">Session Date</div>
      <input type="date" value={date} onChange={e=>{setDate(e.target.value);setSelected(null);}}/>
    </div>
    <div className="card">
      <div className="card-title">Select Lodge</div>
      <input className="lodge-search" type="text" placeholder="Search lodge..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div className="lodge-grid">
        {filtered.map(l => <div key={l} className={chipCls(l)} onClick={()=>selectLodge(l)}>{l}</div>)}
      </div>
    </div>
    {selected && (() => {
      const expected = lodges[selected]||{};
      const items = ITEMS.filter(i=>(expected[i]||0)>0);
      return <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div><div style={{fontSize:20,fontWeight:700}}>{selected}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>Enter quantities from bag</div></div>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setSelected(null);setCurrent({});}}>✕</button>
        </div>
        <table className="tbl">
          <thead><tr><th>Item</th><th className="center">Expected</th><th className="center">Actual</th><th className="center">Status</th></tr></thead>
          <tbody>{items.map(item => {
            const exp=expected[item]||0, act=current[item]??'', diff=act!==''?act-exp:null;
            return <tr key={item}>
              <td className="item-name">{item}</td>
              <td className="center exp-val">{exp}</td>
              <td><div className="stepper">
                <button className="step-btn" onClick={()=>adj(item,-1)}>−</button>
                <input className="step-inp" type="number" min="0" value={act} onChange={e=>setV(item,e.target.value)}/>
                <button className="step-btn" onClick={()=>adj(item,1)}>+</button>
              </div></td>
              <td className="center">
                {diff===null?<span className="chip chip-na">—</span>
                  :diff<0?<span className="chip chip-short">▼ {Math.abs(diff)}</span>
                  :diff>0?<span className="chip chip-over">▲ {diff}</span>
                  :<span className="chip chip-ok">✓ OK</span>}
              </td>
            </tr>;
          })}</tbody>
        </table>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={()=>setCurrent({})}>Reset</button>
          <button className="btn btn-primary" onClick={submit}>✓ Submit Count</button>
        </div>
      </div>;
    })()}
  </>;
}

// ── ALERTS TAB ────────────────────────────────────────────────────────────────
function AlertsTab({counts, saveCounts}) {
  const alerts = counts.filter(c=>c.date===todayStr()&&c.hasShort);
  if (!alerts.length) return <div className="empty"><div className="empty-icon">✅</div>No discrepancies today</div>;

  const markRetrieved = (id, item) => {
    saveCounts(counts.map(c => {
      if (c.id!==id) return c;
      const actual={...c.actual,[item]:c.expected[item]};
      const shorts=c.shorts.filter(s=>s!==item);
      return {...c,actual,shorts,hasShort:shorts.length>0};
    }));
  };

  return <>
    <div style={{marginBottom:8,fontSize:13,color:'var(--text2)'}}>{alerts.length} lodge(s) with missing items today</div>
    {alerts.map(entry => <div key={entry.id} className="alert-box">
      <h3>⚠ {entry.lodge}</h3>
      {entry.shorts.map(item => {
        const missing = entry.expected[item]-entry.actual[item];
        return <div key={item} className="alert-row">
          <span><strong>{item}:</strong> expected {entry.expected[item]}, got {entry.actual[item]} — <span className="alert-missing">{missing} missing</span></span>
          <button className="btn btn-ghost btn-sm" onClick={()=>markRetrieved(entry.id,item)}>✓ Retrieved</button>
        </div>;
      })}
    </div>)}
  </>;
}

// ── GL FLOW TAB ───────────────────────────────────────────────────────────────
function GlFlowTab({glFlow, saveGlFlow, counts, watchList, saveWatch}) {
  const [view, setView] = useState('log');
  const [formDate, setFormDate] = useState(todayStr());
  const [formType, setFormType] = useState('collection');
  const [formData, setFormData] = useState({});
  const [formNotes, setFormNotes] = useState('');

  const autoFill = () => {
    const lastCol = glFlow.find(g=>g.type==='collection');
    const cutoff = lastCol ? lastCol.date : null;
    const relevant = cutoff ? counts.filter(c=>c.date>cutoff&&c.date<=formDate) : counts.filter(c=>c.date<=formDate);
    const totals={};
    relevant.forEach(entry => ITEMS.forEach(item => {
      const v=entry.actual[item]; if(v!=null) totals[item]=(totals[item]||0)+v;
    }));
    setFormData(totals);
  };

  const saveEntry = () => {
    let missing=[];
    if (formType==='delivery') {
      const lastCol=[...glFlow].find(g=>g.type==='collection');
      if (lastCol) ITEMS.forEach(item => {
        const sent=lastCol.data[item]||0, recv=formData[item]||0;
        if (recv<sent) missing.push({item,sent,received:recv,short:sent-recv});
      });
    }
    const entry={id:Date.now(),type:formType,date:formDate,data:{...formData},notes:formNotes,missing,ts:new Date().toISOString()};
    saveGlFlow([entry,...glFlow]);
    if (missing.length>0) {
      const watches=missing.map(m=>({...m,fromDate:formDate,id:Date.now()+Math.random(),resolved:false}));
      saveWatch([...watchList,...watches]);
    }
    setView('log'); setFormData({}); setFormNotes('');
  };

  const unresolved = watchList.filter(w=>!w.resolved);

  const adj = (item,d) => setFormData(p=>({...p,[item]:Math.max(0,(p[item]||0)+d)}));

  if (view==='form') return <>
    <div className="card">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setView('log')}>← Back</button>
        <div style={{fontSize:16,fontWeight:700}}>{formType==='collection'?'📤 GL Collection':'📥 GL Delivery'}</div>
      </div>
      <div style={{marginBottom:12}}>
        <div className="field-label" style={{marginBottom:4}}>Date</div>
        <input type="date" value={formDate} onChange={e=>setFormDate(e.target.value)}/>
      </div>
      {formType==='collection' && <button className="btn btn-ghost btn-full" style={{marginBottom:12}} onClick={autoFill}>⟳ Auto-fill from lodge counts</button>}
      <table className="tbl">
        <thead><tr><th>Item</th><th className="center">{formType==='collection'?'Sent to GL':'Received from GL'}</th></tr></thead>
        <tbody>{ITEMS.map(item => <tr key={item}>
          <td className="item-name">{item}</td>
          <td><div className="stepper">
            <button className="step-btn" onClick={()=>adj(item,-1)}>−</button>
            <input className="step-inp" type="number" min="0" value={formData[item]??0} onChange={e=>setFormData(p=>({...p,[item]:Math.max(0,parseInt(e.target.value)||0)}))}/>
            <button className="step-btn" onClick={()=>adj(item,1)}>+</button>
          </div></td>
        </tr>)}</tbody>
      </table>
      <div style={{marginTop:12}}>
        <div className="field-label" style={{marginBottom:4}}>Notes</div>
        <input type="text" placeholder="Any notes..." value={formNotes} onChange={e=>setFormNotes(e.target.value)}/>
      </div>
      <div className="btn-row">
        <button className="btn btn-ghost" onClick={()=>setView('log')}>Cancel</button>
        <button className="btn btn-primary" onClick={saveEntry}>✓ Save Record</button>
      </div>
    </div>
  </>;

  return <>
    <div className="btn-row" style={{marginBottom:12}}>
      <button className="btn btn-ghost" onClick={()=>{setFormType('collection');setView('form');}}>📤 New Collection</button>
      <button className="btn btn-primary" onClick={()=>{setFormType('delivery');setView('form');}}>📥 New Delivery</button>
    </div>
    {unresolved.length>0 && <div className="watch-box">
      <div style={{fontWeight:700,color:'var(--amber)',marginBottom:8}}>⚠ Watch List — Items Still Owed by GL</div>
      {unresolved.map(w => <div key={w.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid rgba(217,119,6,.2)'}}>
        <div>
          <div style={{fontWeight:600,fontSize:13}}>{w.item} <span className="c-red mono">−{w.short}</span></div>
          <div style={{fontSize:11,color:'var(--text3)'}}>From delivery {fmtDate(w.fromDate)} · sent {w.sent}, received {w.received}</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={()=>saveWatch(watchList.map(x=>x.id===w.id?{...x,resolved:true}:x))}>✓ Received</button>
      </div>)}
    </div>}
    {!glFlow.length ? <div className="empty"><div className="empty-icon">🔄</div>No GL records yet</div>
    : glFlow.slice(0,20).map(entry => {
      const lastCol = entry.type==='delivery' ? glFlow.find(g=>g.type==='collection'&&g.date<entry.date) : null;
      return <div key={entry.id} className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{entry.type==='collection'?'📤 GL Collection':'📥 GL Delivery'}</div>
            <div style={{fontSize:12,color:'var(--text3)',fontFamily:'DM Mono,monospace'}}>{fmtDate(entry.date)}</div>
          </div>
          {entry.missing?.length>0 && <span className="chip chip-short">⚠ Short</span>}
        </div>
        <table className="tbl">
          <thead><tr>
            <th>Item</th>
            <th className="center">{entry.type==='collection'?'Sent':'Received'}</th>
            {lastCol && <th className="center">Was Sent</th>}
            {lastCol && <th className="center">Diff</th>}
          </tr></thead>
          <tbody>{ITEMS.filter(i=>(entry.data[i]||0)>0||(lastCol&&(lastCol.data[i]||0)>0)).map(item => {
            const val=entry.data[item]||0, sent=lastCol?lastCol.data[item]||0:null;
            const diff=sent!==null?val-sent:null;
            return <tr key={item}>
              <td className="item-name">{item}</td>
              <td className="center mono">{val||'—'}</td>
              {lastCol && <td className="center mono c-muted">{sent||'—'}</td>}
              {lastCol && <td className="center mono">
                {diff===null?'—':diff<0?<span className="c-red">▼{Math.abs(diff)}</span>
                  :diff>0?<span className="c-amber">▲{diff}</span>:<span className="c-green">✓</span>}
              </td>}
            </tr>;
          })}</tbody>
        </table>
        {entry.notes && <div style={{marginTop:8,fontSize:12,color:'var(--text2)',fontStyle:'italic'}}>Note: {entry.notes}</div>}
      </div>;
    })}
  </>;
}

// ── FORECAST TAB ──────────────────────────────────────────────────────────────
function ForecastTab({shelf, lodges, season, saveSeason}) {
  const [fcData, setFcData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const GL_DAYS = {high:[1,3,5], low:[1,4]};
  const isGlDay = d => GL_DAYS[season].includes(new Date(d+'T12:00:00').getDay());

  const buildForecast = (checkouts) => {
    const days=[];
    for (let i=0;i<7;i++) {
      const d=new Date(); d.setDate(d.getDate()+i);
      const dateStr=d.toISOString().split('T')[0];
      const lodgeList=(checkouts[dateStr]||[]).filter(l=>!EXCLUDED.has(l)&&lodges[l]);
      const totals={};
      lodgeList.forEach(l => ITEMS.forEach(item => { totals[item]=(totals[item]||0)+(lodges[l][item]||0); }));
      days.push({date:dateStr,lodges:lodgeList,totals,isGl:isGlDay(dateStr)});
    }
    setFcData(days);
  };

  const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/CotsRet/gl-linen/main/checkouts.json';

  const fetchForecast = async () => {
    setLoading(true); setError('');
    try {
      const resp = await fetch(GITHUB_JSON_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('File not found');
      const data = await resp.json();
      const generated = data._generated ? new Date(data._generated).toLocaleString('en-GB') : 'unknown';
      console.log('checkouts.json loaded, generated:', generated);
      buildForecast(data);
    } catch(e) {
      setError('Could not load forecast data. Make sure beds24_report.py has run recently and checkouts.json is on GitHub.');
      console.error(e);
    }
    setLoading(false);
  };

  return <>
    <div className="card">
      <div className="card-title">GL Schedule</div>
      <div className="season-row">
        <div className={`season-btn${season==='high'?' on':''}`} onClick={()=>saveSeason('high')}>
          High Season<br/><span style={{fontSize:11,opacity:.7}}>Mon · Wed · Fri</span>
        </div>
        <div className={`season-btn${season==='low'?' on':''}`} onClick={()=>saveSeason('low')}>
          Low Season<br/><span style={{fontSize:11,opacity:.7}}>Mon · Thu</span>
        </div>
      </div>
      <button className="btn btn-primary btn-full" onClick={fetchForecast} disabled={loading}>
        {loading?'⟳ Loading forecast...':'⟳ Load 7-Day Forecast'}
      </button>
      {error && <div style={{color:'var(--red)',fontSize:13,marginTop:8}}>{error}</div>}
    </div>
    {!fcData && !loading && <div className="empty"><div className="empty-icon">📅</div>Press Load to fetch live checkout data</div>}
    {fcData && fcData.map(day => {
      const items=ITEMS.filter(i=>(day.totals[i]||0)>0);
      return <div key={day.date} className="fc-day" style={day.isGl?{border:'1px solid rgba(45,158,95,.4)'}:{}}>
        <div className="fc-day-header">
          <div>
            <div className="fc-day-name">{getDayName(day.date)}</div>
            <div className="fc-day-date">{fmtDate(day.date)} · {day.lodges.length} GL lodges</div>
          </div>
          {day.isGl && <div className="fc-gl-badge">GL Day</div>}
        </div>
        {!items.length ? <div style={{color:'var(--text3)',fontSize:13}}>No GL cleans</div>
        : items.map(item => {
          const need=day.totals[item]||0, have=shelf[item]||0, ok=have>=need;
          return <div key={item} className="fc-item-row">
            <div className="fc-item-name">{item}</div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div className="fc-item-shelf c-muted">shelf: {have}</div>
              <div className={`fc-item-need ${ok?'c-green':'c-red'}`}>need: {need}</div>
              {!ok && <span className="chip chip-short">▼{need-have}</span>}
            </div>
          </div>;
        })}
      </div>;
    })}
  </>;
}

// ── HISTORY TAB ───────────────────────────────────────────────────────────────
function HistoryTab({counts, saveCounts, lodges}) {
  const [filter, setFilter] = useState('all');
  const [editEntry, setEditEntry] = useState(null);
  const [editData, setEditData] = useState({});

  const filtered = counts.filter(c => {
    if (filter==='short') return c.hasShort;
    if (filter==='over') return c.hasOver&&!c.hasShort;
    if (filter==='ok') return !c.hasShort&&!c.hasOver;
    return true;
  });

  const saveEdit = () => {
    const expected=editEntry.expected, shorts=[], overs=[];
    ITEMS.forEach(item => {
      const exp=expected[item]||0, act=editData[item];
      if (act!=null&&exp>0) { if(act<exp) shorts.push(item); if(act>exp) overs.push(item); }
    });
    saveCounts(counts.map(c=>c.id===editEntry.id?{...c,actual:{...editData},shorts,overs,hasShort:shorts.length>0,hasOver:overs.length>0}:c));
    setEditEntry(null);
  };

  return <>
    {editEntry && <div className="modal-bg" onClick={()=>setEditEntry(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Edit: {editEntry.lodge} — {fmtDate(editEntry.date)}</div>
        <table className="tbl">
          <thead><tr><th>Item</th><th className="center">Expected</th><th className="center">Actual</th></tr></thead>
          <tbody>{ITEMS.filter(i=>(editEntry.expected[i]||0)>0).map(item => <tr key={item}>
            <td className="item-name">{item}</td>
            <td className="center exp-val">{editEntry.expected[item]}</td>
            <td><div className="stepper">
              <button className="step-btn" onClick={()=>setEditData(p=>({...p,[item]:Math.max(0,(p[item]||0)-1)}))}>−</button>
              <input className="step-inp" type="number" min="0" value={editData[item]??0} onChange={e=>setEditData(p=>({...p,[item]:Math.max(0,parseInt(e.target.value)||0)}))}/>
              <button className="step-btn" onClick={()=>setEditData(p=>({...p,[item]:(p[item]||0)+1}))}>+</button>
            </div></td>
          </tr>)}</tbody>
        </table>
        <div className="btn-row" style={{marginTop:16}}>
          <button className="btn btn-ghost" onClick={()=>setEditEntry(null)}>Cancel</button>
          <button className="btn btn-primary" onClick={saveEdit}>Save Changes</button>
        </div>
      </div>
    </div>}
    <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
      {[['all','All'],['short','⚠ Short'],['over','↑ Over'],['ok','✓ OK']].map(([v,l]) =>
        <button key={v} className={`btn btn-sm ${filter===v?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(v)}>{l}</button>
      )}
    </div>
    {!filtered.length ? <div className="empty"><div className="empty-icon">📋</div>No counts recorded yet</div>
    : filtered.map(entry => {
      const color=entry.hasShort?'var(--red)':entry.hasOver?'var(--amber)':'var(--green)';
      const icon=entry.hasShort?'⚠':entry.hasOver?'↑':'✓';
      return <div key={entry.id} className="hist-item">
        <div className="hist-header">
          <div>
            <div className="hist-lodge" style={{color}}>{icon} {entry.lodge}</div>
            <div className="hist-date">{fmtDate(entry.date)}</div>
          </div>
          <span className="edit-link" onClick={()=>{setEditEntry(entry);setEditData({...entry.actual});}}>Edit</span>
        </div>
        <div className="hist-items">
          {ITEMS.filter(i=>(entry.expected[i]||0)>0).map(item => {
            const exp=entry.expected[item],act=entry.actual[item],diff=act!=null?act-exp:null;
            return <span key={item} style={{marginRight:12}}>
              {item}: <span className="mono">{act??'?'}/{exp}</span>
              {diff!==null&&diff<0&&<span className="c-red mono"> ▼{Math.abs(diff)}</span>}
              {diff!==null&&diff>0&&<span className="c-amber mono"> ▲{diff}</span>}
            </span>;
          })}
        </div>
      </div>;
    })}
  </>;
}

// ── SETTINGS TAB ──────────────────────────────────────────────────────────────
function SettingsTab({lodges, saveLodges}) {
  const [name, setName] = useState('');
  const [quantities, setQuantities] = useState({});
  const [saved, setSaved] = useState(false);
  const [deleting, setDeleting] = useState(null);

  const addLodge = () => {
    if (!name.trim()) return;
    saveLodges({...lodges,[name.trim().toUpperCase()]:{...quantities}});
    setName(''); setQuantities({}); setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };
  const deleteLodge = lodge => { const n={...lodges}; delete n[lodge]; saveLodges(n); setDeleting(null); };

  return <>
    {saved && <div className="card" style={{background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',marginBottom:12}}>
      <div style={{color:'var(--green)',fontWeight:700}}>✓ Lodge added successfully</div>
    </div>}
    <div className="card">
      <div className="card-title">Add New Lodge</div>
      <div style={{marginBottom:12}}>
        <div className="field-label" style={{marginBottom:4}}>Lodge Code</div>
        <input type="text" placeholder="e.g. ML29" value={name} onChange={e=>setName(e.target.value.toUpperCase())}/>
      </div>
      <div className="section-hdr">Linen Quantities</div>
      <table className="tbl">
        <thead><tr><th>Item</th><th className="center">Qty</th></tr></thead>
        <tbody>{ITEMS.map(item => <tr key={item}>
          <td className="item-name">{item}</td>
          <td><div className="stepper">
            <button className="step-btn" onClick={()=>setQuantities(p=>({...p,[item]:Math.max(0,(p[item]||0)-1)}))}>−</button>
            <input className="step-inp" type="number" min="0" value={quantities[item]??0} onChange={e=>setQuantities(p=>({...p,[item]:Math.max(0,parseInt(e.target.value)||0)}))}/>
            <button className="step-btn" onClick={()=>setQuantities(p=>({...p,[item]:(p[item]||0)+1}))}>+</button>
          </div></td>
        </tr>)}</tbody>
      </table>
      <button className="btn btn-primary btn-full" style={{marginTop:12}} onClick={addLodge}>+ Add Lodge</button>
    </div>
    <div className="card">
      <div className="card-title">Manage Lodges ({Object.keys(lodges).length})</div>
      {Object.keys(lodges).sort().map(lodge => <div key={lodge} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontWeight:600}}>{lodge}</div>
        {deleting===lodge ? <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setDeleting(null)}>Cancel</button>
          <button className="btn btn-danger btn-sm" onClick={()=>deleteLodge(lodge)}>Delete</button>
        </div> : <button className="btn btn-ghost btn-sm" onClick={()=>setDeleting(lodge)}>Remove</button>}
      </div>)}
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
